name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm run build

      # Package .mcpb
      - run: npx @anthropic-ai/mcpb pack
      - run: npx @anthropic-ai/mcpb validate dist/hermeneia.mcpb || true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hermeneia.mcpb
          generate_release_notes: true
